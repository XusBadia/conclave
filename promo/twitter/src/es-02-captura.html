<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="style.css">
<style>
.frame{width:1600px;height:900px;position:relative;overflow:hidden}
.brand{position:absolute;left:104px;top:60px;z-index:6}
.brand .wordmark{font-size:24px}
.head{position:absolute;left:104px;top:104px;z-index:6}
.head .eb{font-family:var(--mono);font-size:13px;letter-spacing:.2em;color:var(--dim-4);text-transform:uppercase}
.head .h{font-size:34px;font-weight:600;letter-spacing:-.025em;color:var(--ink);margin-top:10px}
.head .h .accent{color:var(--cyan)}
.winwrap{position:absolute;left:104px;top:236px;width:1392px;height:632px;z-index:2}
.winglow{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:80%;height:74%;
  background:radial-gradient(closest-side,rgba(125,211,252,.13),transparent 72%);filter:blur(40px);z-index:0}
.win2{position:relative;z-index:1;width:1392px;height:632px;overflow:hidden;border-radius:14px;
  border:1px solid var(--hair-2);box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 50px 120px -36px rgba(0,0,0,.92)}
.win2 .scr{transform:scale(.96666);transform-origin:top left}
.fade{position:absolute;left:0;right:0;bottom:0;height:176px;z-index:3;pointer-events:none;
  background:linear-gradient(transparent, rgba(11,14,18,.6) 42%, rgba(11,14,18,.97) 88%)}
.gloss{position:absolute;inset:0;z-index:3;pointer-events:none;border-radius:14px;
  background:linear-gradient(120deg, rgba(255,255,255,.05), rgba(255,255,255,0) 24%)}
</style>
<div class="frame">
  <div class="brand">
    <svg class="mark" width="36" height="36" viewBox="0 0 64 64"><path d="M43 20.5C39.9 17.4 35.8 15.5 31.4 15.5C22.5 15.5 15.5 22.8 15.5 32C15.5 41.2 22.5 48.5 31.4 48.5C35.8 48.5 39.9 46.6 43 43.5" fill="none" stroke="#f5f6f8" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="43.5" cy="20.5" r="4.75" fill="#7dd3fc"/><circle cx="43.5" cy="43.5" r="4.75" fill="#7dd3fc"/><circle cx="32" cy="32" r="4.25" fill="#f5f6f8"/></svg>
    <div class="wordmark">Conclave<sup>MD</sup></div>
  </div>
  <div class="head">
    <div class="eb">Captura del producto</div>
    <div class="h">Mira <span class="accent">cómo se construye</span> el veredicto.</div>
  </div>
  <div class="winwrap">
    <div class="winglow"></div>
    <div class="win2">__SCREEN__<div class="gloss"></div><div class="fade"></div></div>
  </div>
</div>
