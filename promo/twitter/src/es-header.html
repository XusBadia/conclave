<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="style.css">
<style>
.frame{width:1500px;height:500px;display:flex;align-items:center;padding:0 96px;gap:56px}
.brand .wordmark{font-size:50px}
.tagline{font-size:21px;color:var(--ink-3);margin-top:18px;letter-spacing:-.01em;font-weight:500}
.mono{font-family:var(--mono);font-size:14px;color:var(--dim-2);letter-spacing:.05em;margin-top:14px}
.mono .hi{color:var(--cyan)}
.divv{width:1px;height:300px;flex:none;background:linear-gradient(transparent,rgba(255,255,255,.12) 30%,rgba(255,255,255,.12) 70%,transparent)}
.right{flex:1;display:flex;flex-direction:column;gap:18px;align-items:flex-start}
.flowrow{display:flex;align-items:center;gap:12px}
.fp{background:var(--card);border:1px solid var(--hair-2);border-radius:11px;padding:15px 20px;min-width:120px}
.fp .n{font-family:var(--mono);font-size:11px;color:var(--dim-3);letter-spacing:1.5px}
.fp .t{font-size:18px;font-weight:600;color:var(--ink-2);margin-top:6px}
.fp.crit{border-color:rgba(125,211,252,.4);background:linear-gradient(180deg,rgba(125,211,252,.07),var(--card))}
.fp.crit .t{color:var(--cyan)}
.arw svg{width:22px;height:22px}
.cap{font-family:var(--mono);font-size:15px;color:var(--dim-2);letter-spacing:.04em}
.cap .hi{color:var(--cyan)}
</style>
<div class="frame">
  <div>
    <div class="brand" style="align-items:flex-end">
      <svg class="mark" width="60" height="60" viewBox="0 0 64 64"><path d="M43 20.5C39.9 17.4 35.8 15.5 31.4 15.5C22.5 15.5 15.5 22.8 15.5 32C15.5 41.2 22.5 48.5 31.4 48.5C35.8 48.5 39.9 46.6 43 43.5" fill="none" stroke="#f5f6f8" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="43.5" cy="20.5" r="4.75" fill="#7dd3fc"/><circle cx="43.5" cy="43.5" r="4.75" fill="#7dd3fc"/><circle cx="32" cy="32" r="4.25" fill="#f5f6f8"/></svg>
      <div class="wordmark">Conclave<sup>MD</sup></div>
    </div>
    <div class="tagline">Un comité clínico, en tu máquina.</div>
    <div class="mono">Local-first · sin telemetría · <span class="hi">código abierto</span></div>
  </div>
  <div class="divv"></div>
  <div class="right">
    <div class="flowrow">
      <div class="fp"><div class="n">01</div><div class="t">Briefing</div></div>
      <div class="arw"><svg viewBox="0 0 24 24" fill="none" stroke="var(--dim-4)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M13 6l6 6-6 6"/></svg></div>
      <div class="fp"><div class="n">02</div><div class="t">Borrador</div></div>
      <div class="arw"><svg viewBox="0 0 24 24" fill="none" stroke="var(--dim-4)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M13 6l6 6-6 6"/></svg></div>
      <div class="fp crit"><div class="n">03</div><div class="t">Crítica</div></div>
      <div class="arw"><svg viewBox="0 0 24 24" fill="none" stroke="var(--dim-4)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M13 6l6 6-6 6"/></svg></div>
      <div class="fp"><div class="n">04</div><div class="t">Veredicto</div></div>
    </div>
    <div class="cap">Deliberación adversaria, anclada en <span class="hi">tus</span> protocolos. Citada. Auditable.</div>
  </div>
</div>
