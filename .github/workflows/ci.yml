name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Single in-flight CI run per ref keeps PR feedback fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: clippy / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      # `protoc` is required by `lance-encoding`, a transitive dep of lancedb.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: cargo test
        run: cargo test --workspace --locked --all-targets

  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.os }}
      - name: cargo build (release)
        run: cargo build --workspace --release --locked
      - name: conclave-cli --help (smoke test)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./target/release/conclave-cli.exe --help
          else
            ./target/release/conclave-cli --help
          fi

  # Linux-only smoke job that proves `conclave-rag --features ocr` still
  # compiles. The OCR pipeline itself is not exercised end-to-end here;
  # tesseract + pdfium need binary fixtures and system libs that we save
  # for a later phase.
  ocr-build:
    name: ocr-build / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tesseract + leptonica + cmake (for tesseract-rs build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr libtesseract-dev libleptonica-dev cmake
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: ocr-build-ubuntu-latest
      - name: cargo build --features ocr (conclave-rag)
        run: cargo build -p conclave-rag --features ocr --locked
