name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Single in-flight CI run per ref keeps PR feedback fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: clippy / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: cargo test
        run: cargo test --workspace --locked --all-targets

  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.os }}
      - name: cargo build (release)
        run: cargo build --workspace --release --locked
      - name: conclave-cli --help (smoke test)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./target/release/conclave-cli.exe --help
          else
            ./target/release/conclave-cli --help
          fi
