name: release

# Fires when a `vX.Y.Z` tag is pushed (or manually from the GitHub UI against
# a tag). Day-to-day verification (fmt/clippy/test/frontend build) runs locally
# via the `.githooks/pre-commit` hook — see README → "Local verification".
#
# What it produces:
#   - A *draft* GitHub Release named after the tag with the Tauri installers
#     attached:
#       * macOS (Apple Silicon) — `.dmg`
#       * Windows — `.msi`
#       * Linux — `.deb` + `.AppImage`
#     You publish manually from the Releases page after sanity-checking.
#   - Workflow artifacts containing `conclave-cli` binaries per platform
#     (not attached to the public Release; download from the workflow run).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# The create-release job and tauri-action both write to GitHub Releases via
# GITHUB_TOKEN. Repos default to a read-only workflow token, which 403s the
# createRelease call ("Resource not accessible by integration"), so grant
# write here explicitly.
permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  create-release:
    name: create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Conclave ${tag}`,
              body: [
                '## Install',
                '',
                '- **macOS (Apple Silicon — M1/M2/M3/M4)**: download the `.dmg`, open it,',
                '  and drag `Conclave.app` to Applications. The app is signed and',
                '  notarised by Apple, so it opens without Gatekeeper warnings.',
                '  Intel Macs are not supported in this release.',
                '- **Windows**: download the `.msi` and run it.',
                '- **Linux**: download the `.deb` (Debian/Ubuntu) or `.AppImage` (any distro).',
                '',
                '## Disclaimer',
                '',
                'Conclave is a decision-support tool, not a medical device. See',
                '[DISCLAIMER.md](https://github.com/XusBadia/conclave/blob/main/DISCLAIMER.md).',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build-tauri:
    name: tauri / ${{ matrix.platform.name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Apple Silicon only. ONNX Runtime (pulled in via fastembed) stopped
          # shipping x86_64-apple-darwin prebuilt binaries with ort 2.x, so a
          # universal build is not currently feasible without compiling ORT
          # from source. Intel Macs (≤ 2020) are excluded from this release.
          - name: macos-arm64
            os: macos-latest
            rust-targets: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          # ubuntu-24.04 (glibc 2.39), not 22.04: the ONNX Runtime prebuilt
          # binary pulled in via fastembed now references glibc 2.38+ symbols
          # (__isoc23_strtoll &c.), which fail to link against 22.04's glibc
          # 2.35. Trade-off: the resulting AppImage/deb now require glibc 2.39
          # (Ubuntu 24.04+, Debian 13+, Fedora 39+).
          - name: linux-x64
            os: ubuntu-24.04
            rust-targets: ""
            tauri-args: ""
          - name: windows-x64
            os: windows-latest
            rust-targets: ""
            tauri-args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      # `protoc` is required by `lance-encoding`, a transitive dep of lancedb.
      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-targets }}

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      # Tauri needs WebKitGTK + GTK headers + librsvg + patchelf to bundle on
      # Linux. Pin Ubuntu 22.04 so the resulting AppImage's glibc requirement
      # stays compatible with older distros.
      - name: install Linux bundler deps
        if: matrix.platform.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: cache cargo (tauri build)
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.platform.name }}

      - name: build & upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarisation. Unused (empty) on Windows/Linux
          # runners; on macOS, tauri-action imports the Developer ID cert and
          # notarises the .dmg/.app via notarytool. All values are repo secrets.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: apps/desktop
          args: ${{ matrix.platform.tauri-args }}

  build-cli:
    name: cli / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cache cargo (cli build)
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.os }}

      - name: cargo build --release -p conclave-cli
        run: cargo build --release --locked -p conclave-cli

      - name: conclave-cli --help (smoke test)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./target/release/conclave-cli.exe --help
          else
            ./target/release/conclave-cli --help
          fi

      - name: upload conclave-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: conclave-cli-${{ matrix.os }}
          path: |
            target/release/conclave-cli
            target/release/conclave-cli.exe
          if-no-files-found: ignore
          retention-days: 30
