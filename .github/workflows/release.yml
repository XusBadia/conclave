name: release

# Only fires when a `vX.Y.Z` tag is pushed (or manually from the GitHub UI).
# Day-to-day verification (fmt/clippy/test/frontend build) runs locally via
# the `.githooks/pre-commit` hook — see README → "Local verification".
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # `protoc` is required by `lance-encoding`, a transitive dep of lancedb.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-build-${{ matrix.os }}

      - name: cargo build --release
        run: cargo build --workspace --release --locked

      - name: conclave-cli --help (smoke test)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./target/release/conclave-cli.exe --help
          else
            ./target/release/conclave-cli --help
          fi

      - name: Upload conclave-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: conclave-cli-${{ matrix.os }}
          path: |
            target/release/conclave-cli
            target/release/conclave-cli.exe
          if-no-files-found: ignore
          retention-days: 30
